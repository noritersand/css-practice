      /* <integer> + <custom-ident> values */
      grid-row-start: 2;
      grid-row-start: some-grid-area 4;

      grid-row-start: span 3;

      /* Global values */
      grid-row-start: inherit;
      grid-row-start: initial;

      grid-row-start: revert-layer;
