    <h1>grid-area</h1>

    <section>
      <div id="toc"></div>

    <section>
      <h2>개요</h2>
      <p>grid-area는 Grid 컨테이너 내의 개별 아이템이 차지할 영역을 지정한다.</p>
      <p>grid-row-start, grid-column-start, grid-row-end, grid-column-end를 한 번에 설정하는 단축 프로퍼티다.</p>
      <p>Grid 아이템에 직접 지정한다. 기본값은 auto</p>

    </section>

    <section>
      <h2>Syntax</h2>
      <pre><code class="language-css"><!--
      /* Keyword values */
      grid-area: auto;
      grid-area: auto / auto;
      grid-area: auto / auto / auto;
      grid-area: auto / auto / auto / auto;

      /* <custom-ident> values */
      grid-area: some-grid-area;
      grid-area: some-grid-area / another-grid-area;

      /* <integer> && <custom-ident>? values */
      grid-area: 4 some-grid-area;
      grid-area: 4 some-grid-area / 2 another-grid-area;

      /* span && [ <integer> || <custom-ident> ] values */
      grid-area: span 3;
      grid-area: span 3 / span some-grid-area;
      grid-area: 2 span / another-grid-area span;

      /* Global values */
      grid-area: inherit;
      grid-area: initial;
      grid-area: revert;
      grid-area: revert-layer;
      grid-area: unset;
      --></code></pre>
    </section>
