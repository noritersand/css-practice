<!doctype html>
<html lang="ko">
<head>
  <title>display: flex</title>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="stylesheet" href="page.css" />
  <script src="/lib/prism/prism.js"></script>
  <script type="module" src="/scripts/fire-when-ready.js"></script>
</head>
<body>
<header>
  <nav></nav>
</header>
<main>
  <article>
    <h1>display: flex</h1>

    <section>
      <div id="toc"></div>
    </section>

    <section>
      <h2>개요</h2>
      <p>display: flex는 CSS의 Flexible Box Layout(줄여서 Flexbox) 모듈을 활성화하는 프로퍼티로, CSS 박스 모델의 레이아웃을 1차원으로 정의할
        때 사용한다.</p>
      <p>기존에 사용하던 float나 inline-box 같은 오래된 프로퍼티 비해 배치와 정렬이 매우 쉽다.</p>
      <div class="code-wrapper">
            <pre><code class="language-css"><!--
            .container {
              display: flex;
              justify-content: space-between;
            }
            --></code></pre>
        <pre><code class="language-html"><!--
            <div class="container">
              <div>left</div>
              <div>center</div>
              <div>right</div>
            </div>
            --></code></pre>
      </div>
      <div class="code-result">
        <div class="container">
          <div>left</div>
          <div>center</div>
          <div>right</div>
        </div>
      </div>
    </section>

  </article>
</main>
<footer>

</footer>
</body>
</html>
